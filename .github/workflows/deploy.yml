name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to WireGuard VPN
        run: |
          sudo apt-get install -y wireguard
          echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo sed -i 's|AllowedIPs.*|AllowedIPs = 192.168.1.0/24|' /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          ping -c 1 -W 5 192.168.1.125 || true
          sleep 2

      - name: Verify VPN connectivity
        run: |
          echo "=== WireGuard status ==="
          sudo wg show
          echo "=== wg0 interface IP ==="
          ip addr show wg0
          echo "=== Routing table ==="
          ip route show table main | grep 192.168
          echo "=== Ping fleet-command ==="
          ping -c 4 192.168.1.125 || echo "Ping failed (ICMP may be filtered)"

      - name: Deploy via control node
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.125
          username: root
          key: ${{ secrets.FLEET_COMMAND_SSH_KEY }}
          script: |
            cd /opt/c3po-prefect
            git pull
            cd ansible
            /usr/local/bin/uv run ansible-playbook playbook.yml --private-key ~/.ssh/ansible_rsa
